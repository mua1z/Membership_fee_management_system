version: 1
services:
  # Backend Web Service
  - type: web
    name: mcms-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # TiDB Cloud MySQL connection string
      # Format: mysql://user:password@host:4000/mcms?ssl-mode=VERIFY_IDENTITY
      - key: MYSQL_URL
        sync: false
      # Alternative: individual DB connection params
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_PORT
        value: 3306
      # Enable SSL for TiDB Cloud / managed MySQL
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          name: mcms-frontend
          type: static_site
          property: url

  - type: static_site
    name: mcms-frontend
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: mcms-backend
          type: web
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
